const fmt = (n) => {
  if(!n&&n!==0) return "$0";
  const a=Math.abs(n),s=n<0?"-":"";
  if(a>=1000000) return `${s}$${(a/1000000).toFixed(1)}M`;
  if(a>=1000) return `${s}$${Math.round(a/1000)}K`;
  return `${s}$${Math.round(a)}`;
};
const ff = (n) => (!n&&n!==0)?"$0":((n<0?"-$":"$")+Math.abs(Math.round(n)).toLocaleString());

function useLS(key,init){
  const [val,setVal]=useState(()=>{ try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;} });
  const save=useCallback(v=>{setVal(v);try{localStorage.setItem(key,JSON.stringify(v));}catch{}},[key]);
  return [val,save];
}
function useAuditLog(){
  const [log,setLog]=useLS("fincc_audit_v2",[]);
  const add=useCallback((module,field,oldVal,newVal,description)=>{
    setLog(prev=>[{id:Date.now(),timestamp:ts(),module,field,oldVal:String(oldVal),newVal:String(newVal),description},...prev].slice(0,300));
  },[setLog]);
  return [log,add,()=>setLog([])];
}

const C={
  navy:"#1a2e4a", blue:"#2d5a8e", blueLight:"#e8f0f9", blueMid:"#5a82b4",
  green:"#1a6e42", greenLight:"#e8f5ee", greenMid:"#4a9e72",
  marigold:"#c47f00", marigoldLight:"#fdf3e0", marigoldMid:"#e09a20",
  red:"#a33a3a", redLight:"#faeaea", redMid:"#c45a5a",

const TT={contentStyle:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:"8px",fontSize:"11px",color:C.text},labelStyle:{color:C.textMuted,fontWeight:600}};

function KPI({label,value,sub,color,alert}){
  return(
    <div style={{...S.card,borderLeft:alert?`3px solid ${alert}`:undefined,padding:"10px 14px"}}>
      <div style={S.kpiLbl}>{label}</div>
      <div style={{...S.kpiVal,color:color||"#1a2e4a"}}>{value}</div>
      {sub&&<div style={S.kpiSub(sub.pos)}>{sub.pos?"▲":"▼"} {sub.text}</div>}
    </div>
  );
}
function PBar({value,max,color="#2d5a8e",label,sub,threshold}){
  const p=Math.min(100,(value/max)*100),over=threshold&&value>threshold;
  return(
    <div style={{marginBottom:"8px"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"3px"}}>
        <span style={{color:"#7a90a8"}}>{label}</span>
        <span style={{color:over?"#a33a3a":"#1a2e4a",fontWeight:600}}>{sub}</span>
      </div>
      <div style={{height:"4px",borderRadius:"3px",background:"#f8fafc"}}>
        <div style={{height:"100%",width:`${p}%`,background:over?"#a33a3a":color,borderRadius:"3px"}}></div>
      </div>
    </div>
  );
}

function computeMonthly(rows){
  return MONTHS.map((m,i)=>{
    const income=rows.filter(r=>r.type==="Income").reduce((s,r)=>s+(Number(r.months[m])||0),0);
    const savings=rows.filter(r=>r.type==="Savings").reduce((s,r)=>s+(Number(r.months[m])||0),0);
    const expenses=rows.filter(r=>r.type==="Expense").reduce((s,r)=>s+(Number(r.months[m])||0),0);
    return{month:ML[i],income,savings,expenses,netCash:income-savings-expenses};
  });
}

// ── OVERVIEW ──────────────────────────────────────────────────
function OverviewModule({budget,actuals,netWorthData,targets,investments}){
  const [tm,setTm]=useState("all");
  const bM=computeMonthly(budget),aM=computeMonthly(actuals);
  const cur=aM[CM],bCur=bM[CM];
  const ytdS=aM.slice(0,CM+1).reduce((s,m)=>s+m.savings,0);
  const ytdI=aM.slice(0,CM+1).reduce((s,m)=>s+m.income,0);
  const planYTDS=bM.slice(0,CM+1).reduce((s,m)=>s+m.savings,0);
  const forecastS=Math.round(ytdS/(CM+1)*12);
  const expVar=((cur.expenses-bCur.expenses)/bCur.expenses*100);
  const sr=ytdI>0?(ytdS/ytdI*100):0;
  const totalA=netWorthData.assets.reduce((s,a)=>s+a.value,0);
  const totalL=netWorthData.liabilities.reduce((s,l)=>s+l.balance,0);
  const nw=totalA-totalL;
  const retA=investments.reduce((s,r)=>s+(r.taxTreatment!=="Taxable"?r.balance:0),0);
  const fcast=[CM+1,CM+2,CM+3].map(i=>{const mi=Math.min(i,11);return{month:ML[mi],income:bM[mi].income,expenses:bM[mi].expenses,netCash:bM[mi].netCash};});
  const chartData=bM.map((b,i)=>({month:b.month,income:aM[i].income,expenses:aM[i].expenses,savings:aM[i].savings,netCash:aM[i].netCash}));
  const discSpend=actuals.filter(r=>r.classification==="Discretionary").reduce((s,r)=>MONTHS.slice(0,CM+1).reduce((ss,m)=>ss+(Number(r.months[m])||0),s),0);
  const topCat=actuals.filter(r=>r.type==="Expense").sort((a,b)=>MONTHS.reduce((s,m)=>s+(Number(b.months[m])||0),0)-MONTHS.reduce((s,m)=>s+(Number(a.months[m])||0),0))[0];
  const insights=[
    {t:"opportunity",txt:`Savings rate YTD: ${sr.toFixed(1)}% — ${sr>=targets.savingsRate?`${(sr-targets.savingsRate).toFixed(1)}pp above`:`${(targets.savingsRate-sr).toFixed(1)}pp below`} the ${targets.savingsRate}% target.`},
    {t:expVar>5?"risk":"info",txt:`Expense variance: ${fp(expVar)} vs plan this month. ${expVar>5?"Monitor discretionary categories.":"Within acceptable range."}`},
    {t:"opportunity",txt:`A 10% reduction in discretionary spending saves ~${ff(Math.round(discSpend*0.10))} YTD and ~${ff(Math.round(discSpend/(CM+1)*12*0.10))} annualized.`},
    {t:"info",txt:`Retirement assets represent ${nw>0?((retA/nw)*100).toFixed(0):0}% of net worth. ${retA>nw*0.75?"Consider increasing taxable brokerage.":"Portfolio mix is balanced."}`},
    topCat?{t:"info",txt:`Largest expense: ${topCat.category} at ${ff(MONTHS.reduce((s,m)=>s+(Number(topCat.months[m])||0),0))} annually.`}:null
  ].filter(Boolean);
  const ic={opportunity:"#1a6e42",info:"#2d5a8e",risk:"#c47f00"};
  const snap=aM.map((m,i)=>({...m,bNC:bM[i].netCash,v:bM[i].netCash!==0?((m.netCash-bM[i].netCash)/Math.abs(bM[i].netCash)*100):0}));
  return(
    <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      <div style={S.grid(6,10)}>
        <KPI label="Month Net Cash" value={ff(cur.netCash)} color={cur.netCash>=0?"#1a6e42":"#a33a3a"} sub={{pos:cur.netCash>=bCur.netCash,text:`${Math.abs(((cur.netCash-bCur.netCash)/Math.max(1,Math.abs(bCur.netCash))*100)).toFixed(1)}% vs plan`}}/>
        <KPI label="Expense Variance" value={`${expVar>=0?"+":""}${expVar.toFixed(1)}%`} color={expVar<=0?"#1a6e42":"#c47f00"} alert={expVar>10?"#c47f00":undefined}/>
        <KPI label="YTD Savings" value={ff(ytdS)} color="#2d5a8e" sub={{pos:ytdS>=planYTDS,text:`${Math.abs(((ytdS-planYTDS)/Math.max(1,planYTDS)*100)).toFixed(1)}% vs plan`}}/>
        <KPI label="Forecast Annual Savings" value={ff(forecastS)} color="#6a5a9e"/>
        <KPI label="Net Worth" value={ff(nw)} color="#1a6e42" sub={{pos:true,text:"4.2% YTD"}}/>
        <KPI label="Retirement Assets" value={ff(retA)} color="#0f6e56" sub={{pos:true,text:"6.8% YTD"}}/>
      </div>
      <div style={S.grid(3,12)}>
        <div style={{...S.card,gridColumn:"1/3"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
            <div style={S.secTitle}>Annual Financial Trend</div>
            <div style={{display:"flex",gap:"4px"}}>
              {["all","income","expenses","savings","netCash"].map(m=>(
                <button key={m} onClick={()=>setTm(m)} style={{...S.btn,...(tm===m?{background:"#2d5a8e",color:"#ffffff",border:"none"}:{}),padding:"3px 8px"}}>{m==="all"?"All":m==="netCash"?"Net Cash":m.charAt(0).toUpperCase()+m.slice(1)}</button>
              ))}
            </div>
          </div>
          <ResponsiveContainer width="100%" height={180}>
            <AreaChart data={chartData} margin={{top:4,right:4,bottom:0,left:0}}>
              <defs>
                {[["I","#1a6e42"],["E","#c47f00"],["S","#2d5a8e"],["N","#6a5a9e"]].map(([k,c])=>(
                  <linearGradient key={k} id={`gO${k}`} x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={c} stopOpacity={0.15}/><stop offset="95%" stopColor={c} stopOpacity={0}/></linearGradient>
                ))}
              </defs>
              <XAxis dataKey="month" tick={{fontSize:10,fill:"#7a90a8"}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fontSize:10,fill:"#7a90a8"}} axisLine={false} tickLine={false} tickFormatter={v=>fmt(v)}/>
              <Tooltip {...TT} formatter={(v,n)=>[ff(v),n]}/>
              {(tm==="all"||tm==="income")&&<Area type="monotone" dataKey="income" stroke="#1a6e42" fill="url(#gOI)" strokeWidth={2} dot={false} name="Income"/>}
              {(tm==="all"||tm==="expenses")&&<Area type="monotone" dataKey="expenses" stroke="#c47f00" fill="url(#gOE)" strokeWidth={2} dot={false} name="Expenses"/>}
              {(tm==="all"||tm==="savings")&&<Area type="monotone" dataKey="savings" stroke="#2d5a8e" fill="url(#gOS)" strokeWidth={2} dot={false} name="Savings"/>}
              {(tm==="all"||tm==="netCash")&&<Area type="monotone" dataKey="netCash" stroke="#6a5a9e" fill="url(#gON)" strokeWidth={2} dot={false} name="Net Cash"/>}
            </AreaChart>
          </ResponsiveContainer>
          <div style={{display:"flex",gap:"14px",marginTop:"5px"}}>
            {[["Income","#1a6e42"],["Expenses","#c47f00"],["Savings","#2d5a8e"],["Net Cash","#6a5a9e"]].map(([l,c])=>(
              <span key={l} style={{display:"flex",alignItems:"center",gap:"4px",fontSize:"10px",color:"#7a90a8"}}><span style={{width:"10px",height:"2px",background:c,display:"inline-block"}}></span>{l}</span>
            ))}
          </div>
        </div>
        <div style={S.card}>
          <div style={S.secTitle}>Insights</div>
          <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>
            {insights.map((ins,i)=>(
              <div key={i} style={{padding:"7px 9px",background:"#f8fafc",borderRadius:"6px",borderLeft:`3px solid ${ic[ins.t]}`}}>
                <p style={{margin:0,fontSize:"11px",color:"#7a90a8",lineHeight:1.5}}>{ins.txt}</p>
              </div>

// ── VARIANCE ──────────────────────────────────────────────────
function VarianceModule({budget,actuals}){
  const [vm,setVm]=useState(CM);
  const [ft,setFt]=useState("All");
  const [onlyVar,setOnlyVar]=useState(false);
  const m=MONTHS[vm];
  const rows=budget.map(bRow=>{
    const aRow=actuals.find(a=>a.category===bRow.category&&a.type===bRow.type);
    const bV=Number(bRow.months[m])||0,aV=aRow?(Number(aRow.months[m])||0):0;
    const diff=aV-bV,pct=bV!==0?(diff/bV*100):(aV!==0?100:0);
    const fav=(bRow.type==="Income"||bRow.type==="Savings")?diff>=0:diff<=0;
    return{...bRow,bV,aV,diff,pct,fav};
  });
  const filtered=rows.filter(r=>(ft==="All"||r.type===ft||r.classification===ft)&&(!onlyVar||Math.abs(r.diff)>0));
  const tB=filtered.reduce((s,r)=>s+r.bV,0),tA=filtered.reduce((s,r)=>s+r.aV,0),tD=tA-tB;
  const ytdRows=budget.map(bRow=>{
    const aRow=actuals.find(a=>a.category===bRow.category&&a.type===bRow.type);
    const bY=MONTHS.slice(0,CM+1).reduce((s,mo)=>s+(Number(bRow.months[mo])||0),0);
    const aY=aRow?MONTHS.slice(0,CM+1).reduce((s,mo)=>s+(Number(aRow.months[mo])||0),0):0;
    return{category:bRow.category,type:bRow.type,classification:bRow.classification,bY,aY,diff:aY-bY};
  });
  const varChart=ytdRows.filter(r=>Math.abs(r.diff)>100).sort((a,b)=>Math.abs(b.diff)-Math.abs(a.diff)).slice(0,10).map(r=>({
    name:r.category,variance:r.diff,fav:(r.type==="Income"||r.type==="Savings")?r.diff>=0:r.diff<=0
  }));
  return(
    <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      <div style={S.grid(4,10)}>
        <KPI label={`${ML[vm]} Budgeted`} value={ff(tB)} color="#1a2e4a"/>
        <KPI label={`${ML[vm]} Actual`} value={ff(tA)} color="#1a2e4a"/>
        <KPI label="Monthly Variance ($)" value={ff(Math.abs(tD))} color={tD<=0?"#1a6e42":"#a33a3a"}/>
        <KPI label="Monthly Variance (%)" value={`${tD>=0?"+":""}${tB!==0?(tD/tB*100).toFixed(1):0}%`} color={tD<=0?"#1a6e42":"#a33a3a"}/>
      </div>
      <div style={S.grid(2,12)}>
        <div style={S.card}>
          <div style={S.secTitle}>YTD Variance by Category</div>
          <ResponsiveContainer width="100%" height={280}>
            <BarChart data={varChart} layout="vertical" margin={{top:0,right:60,bottom:0,left:50}}>
              <XAxis type="number" tick={{fontSize:10,fill:"#7a90a8"}} axisLine={false} tickLine={false} tickFormatter={v=>fmt(v)}/>
              <YAxis type="category" dataKey="name" tick={{fontSize:11,fill:"#7a90a8"}} axisLine={false} tickLine={false} width={70}/>
              <Tooltip {...TT} formatter={(v)=>[ff(v),"Variance"]}/>
              <ReferenceLine x={0} stroke="#d0dce8" strokeWidth={2}/>
              <Bar dataKey="variance" radius={4} name="Variance">
                {varChart.map((e,i)=><Cell key={i} fill={e.fav?"#1a6e42":"#a33a3a"}/>)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={S.card}>
          <div style={{display:"flex",alignItems:"center",marginBottom:"8px"}}>
            <div style={S.secTitle}>Monthly Detail — {ML[vm]}</div>
            <label style={{marginLeft:"auto",fontSize:"11px",color:"#7a90a8",display:"flex",alignItems:"center",gap:"4px",cursor:"pointer"}}>
              <input type="checkbox" checked={onlyVar} onChange={e=>setOnlyVar(e.target.checked)} style={{width:"12px",height:"12px"}}/>Variance only
            </label>
          </div>
          <div style={{display:"flex",gap:"4px",marginBottom:"7px",flexWrap:"wrap"}}>
            {ML.map((ml,i)=><button key={ml} onClick={()=>setVm(i)} style={{...S.btn,...(vm===i?{background:"#2d5a8e",color:"#ffffff",border:"none"}:{}),padding:"2px 6px",fontSize:"10px"}}>{ml}</button>)}
          </div>
          <div style={{display:"flex",gap:"4px",marginBottom:"7px",flexWrap:"wrap"}}>
            {["All","Income","Savings","Expense","Discretionary"].map(f=><button key={f} onClick={()=>setFt(f)} style={{...S.btn,...(ft===f?{background:"#d0dce8",color:"#1a2e4a"}:{}),padding:"2px 6px",fontSize:"10px"}}>{f}</button>)}
          </div>
          <div style={{overflowY:"auto",maxHeight:"230px"}}>
            <table style={S.table}>
              <thead><tr><th style={S.th}>Category</th><th style={{...S.th,textAlign:"right"}}>Budget</th><th style={{...S.th,textAlign:"right"}}>Actual</th><th style={{...S.th,textAlign:"right"}}>Variance</th><th style={{...S.th,textAlign:"right"}}>%</th></tr></thead>
              <tbody>
                {filtered.map((row,i)=>(
                  <tr key={i} style={{borderBottom:"1px solid #eef2f7"}}>
                    <td style={{...S.td,fontSize:"11px"}}>{row.category}</td>
                    <td style={{...S.td,textAlign:"right",fontSize:"11px",color:"#7a90a8"}}>{ff(row.bV)}</td>
                    <td style={{...S.td,textAlign:"right",fontSize:"11px"}}>{ff(row.aV)}</td>
                    <td style={{...S.td,textAlign:"right",fontSize:"11px",color:row.fav?"#1a6e42":"#a33a3a",fontWeight:600}}>{row.diff>=0?"+":""}{ff(row.diff)}</td>
                    <td style={{...S.td,textAlign:"right",fontSize:"10px",color:row.fav?"#1a6e42":"#a33a3a"}}>{row.pct>=0?"+":""}{row.pct.toFixed(0)}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

function NetWorthModule({data,setData,investments,audit}){
  const [tab,setTab]=useState("overview");

  const updA=(u)=>setData({...nw,assets:nw.assets.map(a=>a.id===u.id?u:a)});
  const delA=(id)=>setData({...nw,assets:nw.assets.filter(a=>a.id!==id)});
  const addL=()=>setData({...nw,liabilities:[...nw.liabilities,{id:Date.now(),name:"New Liability",category:"Other",balance:0,rate:0,originalBalance:0,monthlyPayment:0,termYears:0}]});
  const updL=(u)=>setData({...nw,liabilities:nw.liabilities.map(l=>l.id===u.id?u:l)});
  const delL=(id)=>setData({...nw,liabilities:nw.liabilities.filter(l=>l.id!==id)});
  const recordNW=()=>{
    const entry={month:new Date().toLocaleString("default",{month:"short",year:"numeric"}),netWorth:Math.round(netW)};
    setData({...nw,history:[...nw.history.filter(h=>h.month!==entry.month),entry].sort((a,b)=>new Date(a.month)-new Date(b.month))});
  };
  const assetMix=nw.assets.map(a=>({name:a.name,value:a.value}));
  const liabTotalInterest=nw.liabilities.reduce((s,l)=>{const r=l.rate/100/12,n=l.termYears*12;return s+(r>0?l.monthlyPayment*n-l.originalBalance:0);},0);

                      </div>

// ── RETIREMENT ────────────────────────────────────────────────
function RetirementModule({investments}){
  const [p,setP]=useLS("retirement_params_v2",DR);
  const [sb,setSb]=useLS("retirement_scenario_b",{...DR,retirementAge:60,monthlySpending:11000,expectedReturn:6.5});
  const [showB,setShowB]=useState(false);
  const calc=(params,invs)=>{
    const tot=invs.reduce((s,r)=>s+r.balance,0);
    const mc=invs.reduce((s,r)=>s+r.contribution,0);
    const ar=params.expectedReturn/100,ir=params.inflation/100;
    const ytr=params.retirementAge-params.currentAge;
    const rr=(1+ar)/(1+ir)-1;
    const portR=tot*Math.pow(1+ar,ytr)+mc*12*((Math.pow(1+ar,ytr)-1)/ar);
    const annSpend=params.monthlySpending*12*Math.pow(1+ir,ytr);
    const annSS=params.socialSecurity*12;
    const annWD=annSpend-annSS;
    const portN=annWD/0.04;
    const fr=portR/portN;
    const gd=Array.from({length:ytr+31},(_,i)=>{
      let v;
      if(i<=ytr){v=tot*Math.pow(1+ar,i)+mc*12*((Math.pow(1+ar,i)-1)/ar);}
      else{const rp=tot*Math.pow(1+ar,ytr)+mc*12*((Math.pow(1+ar,ytr)-1)/ar),wy=i-ytr;v=rp*Math.pow(1+rr,wy)-annWD*((Math.pow(1+rr,wy)-1)/rr);}
      return{age:params.currentAge+i,value:Math.max(0,Math.round(v)),phase:i<=ytr?"acc":"wd"};
    });
    return{portR,portN,fr,annSS,annWD,gd,ytr,rr,annSpend};
  };
  const A=calc(p,investments);
  const B=showB?calc(sb,investments):null;
  const isFunded=A.fr>=1.0;
  const preRoth=investments.filter(r=>r.taxTreatment==="Pre-Tax").reduce((s,r)=>s+r.balance,0);
  const combined=A.gd.map((d,i)=>({...d,valueB:B?B.gd[i]?.value:undefined}));
  const rmd=[65,70,75,80,85].map(age=>{
    const yrs=age-p.retirementAge,factor={65:26.5,70:22.0,75:18.0,80:14.8,85:12.0};
    const pv=Math.max(0,A.portR*Math.pow(1+A.rr,yrs)-A.annWD*((Math.pow(1+A.rr,yrs)-1)/A.rr));
    const preA=preRoth*Math.pow(1+p.expectedReturn/100,age-p.currentAge);
    return{age:`Age ${age}`,rmd:Math.max(0,Math.round(preA/factor[age])),portValue:Math.max(0,Math.round(pv))};
  });
  const rothConv=[50000,100000,150000].map(amt=>{
    const taxNow=amt*0.24,fv=amt*Math.pow(1+p.expectedReturn/100,p.retirementAge-p.currentAge),taxLater=fv*0.22;
    return{amt,taxNow,fv,taxLater,net:taxLater-taxNow};
  });
  const monthlyIncome=Math.round((A.annSS+A.portR*0.04)/12);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      <div style={S.grid(4,10)}>
        <KPI label="Portfolio at Retirement" value={ff(Math.round(A.portR))} color="#1a6e42"/>
        <KPI label="Portfolio Needed (4% rule)" value={ff(Math.round(A.portN))} color="#1a2e4a"/>
        <KPI label="Funding Ratio" value={`${(A.fr*100).toFixed(0)}%`} color={isFunded?"#1a6e42":"#a33a3a"} alert={!isFunded?"#a33a3a":undefined}/>
        <KPI label="Monthly Retirement Income" value={ff(monthlyIncome)} color="#2d5a8e"/>
      </div>
      <div style={S.grid(3,12)}>
        <div style={{...S.card,gridColumn:"1/3"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}}>
            <div style={S.secTitle}>Portfolio Value Over Time</div>
            <label style={{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"#7a90a8",cursor:"pointer"}}>
              <input type="checkbox" checked={showB} onChange={e=>setShowB(e.target.checked)} style={{width:"12px",height:"12px"}}/>Show Scenario B
            </label>
          </div>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={combined} margin={{top:4,right:4,bottom:0,left:0}}>
              <defs>
                <linearGradient id="gPA" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#2d5a8e" stopOpacity={0.2}/><stop offset="95%" stopColor="#2d5a8e" stopOpacity={0}/></linearGradient>
                <linearGradient id="gPB" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#6a5a9e" stopOpacity={0.2}/><stop offset="95%" stopColor="#6a5a9e" stopOpacity={0}/></linearGradient>
              </defs>
              <XAxis dataKey="age" tick={{fontSize:10,fill:"#7a90a8"}} axisLine={false} tickLine={false} interval={4}/>
              <YAxis tick={{fontSize:10,fill:"#7a90a8"}} axisLine={false} tickLine={false} tickFormatter={v=>fmt(v)}/>
              <Tooltip {...TT} formatter={v=>[ff(v)]} labelFormatter={v=>`Age ${v}`}/>
              <ReferenceLine x={p.retirementAge} stroke="#d0dce8" strokeDasharray="4 2" label={{value:"Retire",fill:"#7a90a8",fontSize:10}}/>
              <Area type="monotone" dataKey="value" stroke="#2d5a8e" fill="url(#gPA)" strokeWidth={2} dot={false} name="Scenario A"/>
              {showB&&<Area type="monotone" dataKey="valueB" stroke="#6a5a9e" fill="url(#gPB)" strokeWidth={2} dot={false} name="Scenario B"/>}
            </AreaChart>
          </ResponsiveContainer>
        </div>

// ── SCENARIOS ─────────────────────────────────────────────────
function ScenarioModule({budget,actuals,investments}){
  const aM=computeMonthly(actuals);
  const baseSav=aM.reduce((s,m)=>s+m.savings,0);
  const baseNC=aM.reduce((s,m)=>s+m.netCash,0);
  const baseTot=investments.reduce((s,r)=>s+r.balance,0);
  const baseContrib=investments.reduce((s,r)=>s+r.contribution,0);
  const [sliders,setSliders]=useState({contrib401k:500,extraMortgage:0,discCut:0,bonusInvested:0});
  const gR=0.075;
  const w5=([1,2,3,4,5]).map(yr=>({
    year:`Y${yr}`,
    baseline:Math.round(baseTot*Math.pow(1+gR,yr)+baseContrib*12*((Math.pow(1+gR,yr)-1)/gR)),
    max401k:Math.round(baseTot*Math.pow(1+gR,yr)+(baseContrib+sliders.contrib401k)*12*((Math.pow(1+gR,yr)-1)/gR)),
    custom:Math.round((baseTot+sliders.bonusInvested)*Math.pow(1+gR,yr)+(baseContrib+sliders.contrib401k+sliders.discCut)*12*((Math.pow(1+gR,yr)-1)/gR)),
  }));
  const customPort5=w5[4]?.custom||0;
  const basePort5=w5[4]?.baseline||0;
  const addlSavings=sliders.contrib401k*12+sliders.bonusInvested+sliders.discCut*12;
  const scenarioTable=[
    {name:"Baseline (Current)",sav:baseSav,delta:0},
    {name:`+${ff(sliders.contrib401k)}/mo 401k`,sav:baseSav+sliders.contrib401k*12,delta:sliders.contrib401k*12},
    {name:`Cut dining 20% (~$960/yr)`,sav:baseSav+960,delta:960},
    {name:`Invest full bonus`,sav:baseSav+15000,delta:15000},
    {name:`All combined`,sav:baseSav+sliders.contrib401k*12+960+15000,delta:sliders.contrib401k*12+960+15000},

  return(
    <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      <div style={S.grid(3,10)}>

        <div style={S.card}>
          <div style={S.secTitle}>Custom What-If Model</div>

              {k:"contrib401k",lbl:"Additional 401k Contribution (mo.)",min:0,max:2000,step:50,pre:"$"},
              {k:"extraMortgage",lbl:"Extra Mortgage Payment (mo.)",min:0,max:2000,step:50,pre:"$"},
              {k:"discCut",lbl:"Discretionary Spend Reduction (mo.)",min:0,max:1000,step:25,pre:"$"},
              {k:"bonusInvested",lbl:"Annual Bonus Invested",min:0,max:20000,step:500,pre:"$"},
            ].map(s=>(
              <div key={s.k}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",marginBottom:"4px"}}>
                  <label style={{color:"#7a90a8"}}>{s.lbl}</label>
                  <span style={{color:"#1a2e4a",fontWeight:600}}>{s.pre}{sliders[s.k].toLocaleString()}</span>
                </div>
                <input type="range" min={s.min} max={s.max} step={s.step} value={sliders[s.k]} onChange={e=>setSliders({...sliders,[s.k]:Number(e.target.value)})} style={{width:"100%",accentColor:"#2d5a8e"}}/>

// ── YEAR-OVER-YEAR ────────────────────────────────────────────
function YoYModule({netWorthData}){
  const hist=netWorthData.history;
  const years=[...new Set(hist.map(h=>h.month.split(" ")[1]))];
  const byYear=years.map(yr=>{
    const pts=hist.filter(h=>h.month.includes(yr));
    const start=pts[0]?.netWorth,end=pts[pts.length-1]?.netWorth,chg=(end||0)-(start||0);
    return{year:yr,start,end,chg};
  });
  const allTime=Math.max(...hist.map(h=>h.netWorth));
  const avgMonthly=hist.length>1?Math.round((hist[hist.length-1].netWorth-hist[0].netWorth)/hist.length):0;
  const chartData=hist.map(h=>({month:h.month,value:h.netWorth}));
  return(
    <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
      <div style={S.grid(Math.min(byYear.length+2,6),10)}>
        {byYear.map(y=><KPI key={y.year} label={`${y.year} NW Change`} value={ff(y.chg)} color={y.chg>=0?"#1a6e42":"#a33a3a"} sub={{pos:y.chg>=0,text:`${y.start?((y.chg/y.start)*100).toFixed(1):0}% growth`}}/>)}
        <KPI label="All-Time High" value={ff(allTime)} color="#6a5a9e"/>
        <KPI label="Avg Monthly Growth" value={ff(avgMonthly)} color="#2d5a8e"/>
      </div>
      <div style={S.card}>
        <div style={S.secTitle}>Net Worth Trend — All Periods</div>
        <ResponsiveContainer width="100%" height={220}>
          <AreaChart data={chartData} margin={{top:4,right:4,bottom:0,left:0}}>
            <defs><linearGradient id="gYoY" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#2d5a8e" stopOpacity={0.2}/><stop offset="95%" stopColor="#2d5a8e" stopOpacity={0}/></linearGradient></defs>
            <XAxis dataKey="month" tick={{fontSize:10,fill:"#7a90a8"}} axisLine={false} tickLine={false} interval={2}/>
            <YAxis tick={{fontSize:10,fill:"#7a90a8"}} axisLine={false} tickLine={false} tickFormatter={v=>fmt(v)}/>
            <Tooltip {...TT} formatter={v=>[ff(v),"Net Worth"]}/>
            <Area type="monotone" dataKey="value" stroke="#2d5a8e" fill="url(#gYoY)" strokeWidth={2} dot={false}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
      <div style={S.card}>
        <div style={S.secTitle}>Year-over-Year Summary</div>
        <table style={S.table}>
          <thead><tr><th style={S.th}>Year</th><th style={{...S.th,textAlign:"right"}}>Start</th><th style={{...S.th,textAlign:"right"}}>End</th><th style={{...S.th,textAlign:"right"}}>Change ($)</th><th style={{...S.th,textAlign:"right"}}>Change (%)</th><th style={{...S.th,textAlign:"right"}}>Avg/Month</th></tr></thead>
          <tbody>
            {byYear.map(y=>(
              <tr key={y.year} style={{borderBottom:"1px solid #eef2f7"}}>
                <td style={S.td}>{y.year}</td>
                <td style={{...S.td,textAlign:"right",color:"#7a90a8"}}>{y.start?ff(y.start):"—"}</td>
                <td style={{...S.td,textAlign:"right"}}>{y.end?ff(y.end):"—"}</td>
                <td style={{...S.td,textAlign:"right",color:y.chg>=0?"#1a6e42":"#a33a3a",fontWeight:600}}>{ff(y.chg)}</td>
                <td style={{...S.td,textAlign:"right",color:y.chg>=0?"#1a6e42":"#a33a3a"}}>{y.start?fp(y.chg/y.start*100):"—"}</td>
                <td style={{...S.td,textAlign:"right",color:"#7a90a8"}}>{ff(Math.round(y.chg/12))}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── TARGETS ───────────────────────────────────────────────────
function TargetsModule({targets,setTargets,budget,actuals,investments}){
  const aM=computeMonthly(actuals);
  const cur=aM[CM];

      </div>
      <div style={S.card}>
        <div style={{display:"flex",alignItems:"center",marginBottom:"10px",gap:"6px"}}>
          <div style={S.secTitle}>Change Log</div>
          <div style={{display:"flex",gap:"4px",marginLeft:"auto",flexWrap:"wrap"}}>
            {mods.map(m=><button key={m} onClick={()=>setFm(m)} style={{...S.btn,...(fm===m?{background:"#2d5a8e",color:"#ffffff",border:"none"}:{}),padding:"2px 8px"}}>{m}</button>)}
            <button style={{...S.btn,color:"#a33a3a"}} onClick={()=>{if(window.confirm("Clear audit log?"))clearLog();}}>Clear</button>
          </div>
        </div>
        {filtered.length===0?(
          <div style={{padding:"40px",textAlign:"center",color:"#7a90a8",fontSize:"13px"}}>No changes recorded yet. Edit values in Budget, Actuals, or Net Worth to generate entries.</div>
        ):(
          <div style={{overflowY:"auto",maxHeight:"500px"}}>
            <table style={S.table}>
              <thead><tr><th style={S.th}>Timestamp</th><th style={S.th}>Module</th><th style={S.th}>Field</th><th style={{...S.th,textAlign:"right"}}>Old</th><th style={{...S.th,textAlign:"right"}}>New</th><th style={S.th}>Description</th></tr></thead>
              <tbody>
                {filtered.map(e=>(
                  <tr key={e.id} style={{borderBottom:"1px solid #eef2f7"}}>
                    <td style={{...S.td,fontSize:"10px",color:"#7a90a8",whiteSpace:"nowrap"}}>{e.timestamp}</td>
                    <td style={S.td}><span style={S.badge("#2d5a8e")}>{e.module}</span></td>
                    <td style={{...S.td,fontSize:"11px"}}>{e.field}</td>
                    <td style={{...S.td,textAlign:"right",color:"#a33a3a",fontSize:"11px"}}>{e.oldVal}</td>
                    <td style={{...S.td,textAlign:"right",color:"#1a6e42",fontSize:"11px",fontWeight:600}}>{e.newVal}</td>
                    <td style={{...S.td,fontSize:"11px",color:"#7a90a8"}}>{e.description}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────
const TABS=[
  {id:"overview",label:"Overview"},
  {id:"budget",label:"Budget Setup"},
  {id:"actuals",label:"Actuals Entry"},
  {id:"variance",label:"Variance"},
  {id:"networth",label:"Net Worth"},
  {id:"investments",label:"Investments"},
  {id:"retirement",label:"Retirement"},
  {id:"scenarios",label:"Scenarios"},
  {id:"yoy",label:"Year-over-Year"},
  {id:"targets",label:"Targets"},
  {id:"auditlog",label:"Audit Log"},
];

function App(){
  const [tab,setTab]=useState("overview");
  const [budget,setBudget]=useLS("fincc_budget_v2",DB);
  const [actuals,setActuals]=useLS("fincc_actuals_v2",DA);
  const [investments,setInvestments]=useLS("fincc_investments_v2",DI);
  const [netWorthData,setNetWorthData]=useLS("fincc_networth_v2",DNW);
  const [targets,setTargets]=useLS("fincc_targets_v2",DT);
  const [saveSt,setSaveSt]=useState("All changes saved");
  const [log,addAudit,clearLog]=useAuditLog();
  const debRef=useRef(null);

  useEffect(()=>{
    setSaveSt("Saving…");
    clearTimeout(debRef.current);
    debRef.current=setTimeout(()=>setSaveSt("All changes saved"),700);
  },[budget,actuals,investments,netWorthData,targets]);

  const exportData=()=>{
    const blob=new Blob([JSON.stringify({budget,actuals,investments,netWorthData,targets,log},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="fincommand-export.json";a.click();
  };
  const importData=()=>{
    const inp=document.createElement("input");inp.type="file";inp.accept=".json";
    inp.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.budget)setBudget(d.budget);if(d.actuals)setActuals(d.actuals);if(d.investments)setInvestments(d.investments);if(d.netWorthData)setNetWorthData(d.netWorthData);if(d.targets)setTargets(d.targets);}catch{alert("Invalid file format.");}};
      r.readAsText(f);
    };
    inp.click();
  };

  return(
    <div style={S.app}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
      <nav style={S.nav}>
        <span style={S.navTitle}>FinCommand</span>
        {TABS.map(t=><button key={t.id} style={S.navBtn(tab===t.id)} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        <div style={{display:"flex",alignItems:"center",gap:"7px",marginLeft:"auto",paddingLeft:"10px",flexShrink:0}}>
          {log.length>0&&<span style={{fontSize:"10px",color:"#c47f00",background:"#c47f0018",padding:"1px 6px",borderRadius:"4px",whiteSpace:"nowrap"}}>{log.length} changes</span>}
          <span style={{fontSize:"10px",color:"#7a90a8",whiteSpace:"nowrap"}}>{saveSt}</span>
          <button style={S.btn} onClick={importData}>Import</button>
          <button style={S.btn} onClick={exportData}>Export</button>
        </div>
      </nav>
      <div style={S.content}>
        {tab==="overview"    &&<OverviewModule budget={budget} actuals={actuals} netWorthData={netWorthData} targets={targets} investments={investments}/>}
        {tab==="budget"      &&<BudgetModule rows={budget} setRows={setBudget} label="Annual Budget Plan" audit={addAudit}/>}
        {tab==="actuals"     &&<BudgetModule rows={actuals} setRows={setActuals} label="Monthly Actuals Entry" audit={addAudit}/>}
        {tab==="variance"    &&<VarianceModule budget={budget} actuals={actuals}/>}
        {tab==="networth"    &&<NetWorthModule data={netWorthData} setData={setNetWorthData} investments={investments} audit={addAudit}/>}
        {tab==="investments" &&<InvestmentsModule investments={investments} setInvestments={setInvestments}/>}
        {tab==="retirement"  &&<RetirementModule investments={investments}/>}
        {tab==="scenarios"   &&<ScenarioModule budget={budget} actuals={actuals} investments={investments}/>}
        {tab==="yoy"         &&<YoYModule netWorthData={netWorthData}/>}
        {tab==="targets"     &&<TargetsModule targets={targets} setTargets={setTargets} budget={budget} actuals={actuals} investments={investments}/>}
        {tab==="auditlog"    &&<AuditModule log={log} clearLog={clearLog}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
})();
  </script>
</body>
</html>
